<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎧 Palco Karaoke</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

body {
  background-color: #0f172a;
  color: white;
}

/* HEADER FIXO */
header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  padding: 20px;
  background: linear-gradient(180deg, #2563eb, #0f172a);
  transition: 0.3s ease;
}

header.scrolled {
  background: #0f172a;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.header-content {
  max-width: 1100px;
  margin: auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: #facc15;
}

.phone {
  background-color: #facc15;
  color: #0f172a;
  padding: 8px 15px;
  border-radius: 20px;
  font-weight: 600;
  text-decoration: none;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 120px 20px 40px 20px;
}

/* BARRA DE BUSCA */
.search-box {
  margin-bottom: 25px;
  transition: 0.3s ease;
}

.search-box.sticky {
  position: fixed;
  top: 80px;
  left: 0;
  width: 100%;
  padding: 15px 20px;
  background: #0f172a;
  z-index: 999;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

.search-box input {
  width: 100%;
  padding: 14px 20px;
  border-radius: 30px;
  border: none;
  font-size: 16px;
  background-color: #1e293b;
  color: white;
}

.search-box input:focus {
  outline: 2px solid #facc15;
}

#counter {
  margin-bottom: 20px;
  color: #cbd5e1;
}

/* LISTA */
.song-card {
  background-color: #1e293b;
  padding: 15px 20px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s ease;
  text-decoration: none;
  color: white;
}

.song-card:hover {
  background-color: #334155;
}

.song-title {
  font-weight: 600;
}

.play-btn {
  background-color: #facc15;
  border: none;
  color: #0f172a;
  padding: 8px 14px;
  border-radius: 20px;
  font-weight: bold;
}

.loading {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}

/* BOTÃO WHATSAPP FLUTUANTE */
.whatsapp-float {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background-color: #25D366;
  color: white;
  font-size: 26px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  box-shadow: 0 6px 15px rgba(0,0,0,0.4);
  z-index: 1000;
  transition: transform 0.2s ease;
}

.whatsapp-float:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<header id="header">
  <div class="header-content">
    <h1>🎧 Palco Karaoke</h1>
    <a class="phone" href="https://wa.me/5519992850200" target="_blank">
      📱 19 99285-0200
    </a>
  </div>
</header>

<div class="container">

  <div class="search-box" id="searchBox">
    <input type="text" id="search" placeholder="Buscar artista ou música...">
  </div>

  <div id="counter"></div>
  <div id="list"></div>
  <div id="loading" class="loading"></div>

</div>

<!-- BOTÃO FLUTUANTE -->
<a href="https://wa.me/5519992850200" target="_blank" class="whatsapp-float">
  💬
</a>

<script>
let musicas = [];

const searchInput = document.getElementById("search");
const list = document.getElementById("list");
const counter = document.getElementById("counter");
const loading = document.getElementById("loading");
const header = document.getElementById("header");
const searchBox = document.getElementById("searchBox");

let resultados = [];
let pagina = 0;
const porPagina = 200;
let carregando = false;

function normalize(text) {
  return text.toLowerCase()
             .normalize("NFD")
             .replace(/[\u0300-\u036f]/g, "");
}

fetch("musicas.json")
  .then(res => res.json())
  .then(data => {
    musicas = data;
    novaBusca(musicas);
  });

function renderMais() {
  if (carregando) return;
  if (pagina * porPagina >= resultados.length) return;

  carregando = true;
  loading.innerText = "Carregando...";

  setTimeout(() => {
    const inicio = pagina * porPagina;
    const fim = inicio + porPagina;
    const lote = resultados.slice(inicio, fim);

    lote.forEach(m => {
      const a = document.createElement("a");
      a.href = m.url;
      a.target = "_blank";
      a.className = "song-card";

      a.innerHTML = `
        <span class="song-title">${m.titulo}</span>
        <span class="play-btn">▶</span>
      `;

      list.appendChild(a);
    });

    pagina++;
    carregando = false;
    loading.innerText = "";
  }, 200);
}

function novaBusca(lista) {
  list.innerHTML = "";
  pagina = 0;
  resultados = lista;
  counter.innerText = lista.length + " músicas encontradas";
  renderMais();
}

searchInput.addEventListener("input", () => {
  const query = normalize(searchInput.value);
  const filtradas = musicas.filter(m =>
    normalize(m.titulo).includes(query)
  );
  novaBusca(filtradas);
});

window.addEventListener("scroll", () => {

  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }

  if (window.scrollY > 120) {
    searchBox.classList.add("sticky");
  } else {
    searchBox.classList.remove("sticky");
  }

  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
    renderMais();
  }
});
</script>

</body>
</html>
