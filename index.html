<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎧 Palco Karaoke</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }

body {
  background-color: #0f172a;
  color: white;
}

header {
  padding: 40px 20px;
  background: linear-gradient(180deg, #2563eb, #0f172a);
}

header h1 {
  font-size: 2.5rem;
  font-weight: 700;
  color: #facc15;
}

header p {
  margin-top: 8px;
  color: #e5e7eb;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.search-box {
  margin-bottom: 25px;
}

.search-box input {
  width: 100%;
  padding: 14px 20px;
  border-radius: 30px;
  border: none;
  font-size: 16px;
  background-color: #1e293b;
  color: white;
}

.search-box input:focus {
  outline: 2px solid #facc15;
}

#counter {
  margin-bottom: 20px;
  color: #cbd5e1;
}

.song-card {
  background-color: #1e293b;
  padding: 15px 20px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.2s ease;
  text-decoration: none;
  color: white;
}

.song-card:hover {
  background-color: #334155;
}

.song-title {
  font-weight: 600;
}

.play-btn {
  background-color: #facc15;
  border: none;
  color: #0f172a;
  padding: 8px 14px;
  border-radius: 20px;
  font-weight: bold;
}

.loading {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>
  <div class="container">
    <h1>🎧 Palco Karaoke</h1>
    <p>Encontre sua música e solte a voz!</p>
  </div>
</header>

<div class="container">
  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar artista ou música...">
  </div>

  <div id="counter"></div>
  <div id="list"></div>
  <div id="loading" class="loading"></div>
</div>

<script>
let musicas = [];

const searchInput = document.getElementById("search");
const list = document.getElementById("list");
const counter = document.getElementById("counter");
const loading = document.getElementById("loading");

let resultados = [];
let pagina = 0;
const porPagina = 200;
let carregando = false;

function normalize(text) {
  return text.toLowerCase()
             .normalize("NFD")
             .replace(/[\u0300-\u036f]/g, "");
}

fetch("musicas.json")
  .then(res => res.json())
  .then(data => {
    musicas = data;
    novaBusca(musicas);
  });

function renderMais() {
  if (carregando) return;
  if (pagina * porPagina >= resultados.length) return;

  carregando = true;
  loading.innerText = "Carregando...";

  setTimeout(() => {
    const inicio = pagina * porPagina;
    const fim = inicio + porPagina;
    const lote = resultados.slice(inicio, fim);

    lote.forEach(m => {
      const a = document.createElement("a");
      a.href = m.url;
      a.target = "_blank";
      a.className = "song-card";

      a.innerHTML = `
        <span class="song-title">${m.titulo}</span>
        <span class="play-btn">▶</span>
      `;

      list.appendChild(a);
    });

    pagina++;
    carregando = false;
    loading.innerText = "";
  }, 200);
}

function novaBusca(lista) {
  list.innerHTML = "";
  pagina = 0;
  resultados = lista;
  counter.innerText = lista.length + " músicas encontradas";
  renderMais();
}

searchInput.addEventListener("input", () => {
  const query = normalize(searchInput.value);
  const filtradas = musicas.filter(m =>
    normalize(m.titulo).includes(query)
  );
  novaBusca(filtradas);
});

window.addEventListener("scroll", () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
    renderMais();
  }
});
</script>

</body>
</html>
